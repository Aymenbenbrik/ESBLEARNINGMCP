<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Trace Analytics — ESB Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background: #f5f7fa; }
    .kpi-card { border-left: 4px solid; }
    .kpi-card.blue  { border-color: #0d6efd; }
    .kpi-card.green { border-color: #198754; }
    .kpi-card.red   { border-color: #dc3545; }
    .kpi-card.orange{ border-color: #fd7e14; }
    .step-badge { font-size: .75rem; padding: 2px 6px; border-radius: 4px; }
    .step-thinking    { background: #e9f5ff; color: #0d6efd; }
    .step-tool_call   { background: #fff3cd; color: #856404; }
    .step-tool_result { background: #d1e7dd; color: #0f5132; }
    .step-final       { background: #f8d7da; color: #842029; }
  </style>
</head>
<body>
<div class="container-fluid py-4">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="mb-0 fw-bold">🔍 Agent Trace Analytics</h3>
      <small class="text-muted">Observabilité des pipelines ReAct — ESB-Learning</small>
    </div>
    <div class="d-flex gap-2">
      <select id="periodSelect" class="form-select form-select-sm" style="width:120px" onchange="loadAll()">
        <option value="7">7 jours</option>
        <option value="30" selected>30 jours</option>
        <option value="90">90 jours</option>
        <option value="0">Tout</option>
      </select>
      <select id="statusSelect" class="form-select form-select-sm" style="width:120px" onchange="loadAll()">
        <option value="">Tous statuts</option>
        <option value="success">Succès</option>
        <option value="error">Erreurs</option>
      </select>
    </div>
  </div>

  <!-- KPIs -->
  <div class="row g-3 mb-4" id="kpiRow">
    <div class="col-md-3">
      <div class="card kpi-card blue h-100">
        <div class="card-body">
          <div class="text-muted small">Total traces</div>
          <div class="fs-2 fw-bold" id="kpiTotal">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card kpi-card green h-100">
        <div class="card-body">
          <div class="text-muted small">Taux de succès</div>
          <div class="fs-2 fw-bold" id="kpiSuccessRate">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card kpi-card orange h-100">
        <div class="card-body">
          <div class="text-muted small">Durée médiane</div>
          <div class="fs-2 fw-bold" id="kpiMedianDuration">—</div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card kpi-card red h-100">
        <div class="card-body">
          <div class="text-muted small">Outils distincts utilisés</div>
          <div class="fs-2 fw-bold" id="kpiTools">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts row -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card h-100">
        <div class="card-header fw-semibold">Top outils utilisés</div>
        <div class="card-body"><canvas id="chartTools" height="200"></canvas></div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card h-100">
        <div class="card-header fw-semibold">Distribution durée (ms)</div>
        <div class="card-body"><canvas id="chartDuration" height="200"></canvas></div>
      </div>
    </div>
  </div>

  <!-- Trace table -->
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">Traces récentes</span>
      <small class="text-muted" id="tableCount"></small>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-sm mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th><th>Rôle</th><th>Message</th>
              <th>Étapes</th><th>Outils</th>
              <th>Durée</th><th>Statut</th><th>Date</th><th></th>
            </tr>
          </thead>
          <tbody id="traceTableBody">
            <tr><td colspan="9" class="text-center text-muted py-4">Chargement…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Trace detail modal -->
<div class="modal fade" id="traceModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Détail trace <span id="modalTraceId"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody">Chargement…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_BASE = '/api/v1/admin/agents/traces';
let chartTools = null, chartDuration = null;

async function apiFetch(url) {
  const token = document.cookie.split(';').map(c => c.trim())
    .find(c => c.startsWith('access_token='))?.split('=')[1] || '';
  const res = await fetch(url, {
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
  });
  return res.json();
}

function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : Math.round((s[m-1] + s[m]) / 2);
}

function formatMs(ms) {
  if (!ms) return '—';
  return ms >= 1000 ? `${(ms/1000).toFixed(1)}s` : `${ms}ms`;
}

function roleBadge(role) {
  const colors = { student: 'primary', teacher: 'success', admin: 'warning' };
  return `<span class="badge bg-${colors[role] || 'secondary'}">${role || '?'}</span>`;
}

function statusBadge(status) {
  return status === 'success'
    ? '<span class="badge bg-success">✓ succès</span>'
    : '<span class="badge bg-danger">✗ erreur</span>';
}

async function loadAll() {
  const period = document.getElementById('periodSelect').value;
  const status = document.getElementById('statusSelect').value;
  let url = `${API_BASE}?per_page=200`;
  if (status) url += `&status=${status}`;
  const data = await apiFetch(url);
  const traces = data.traces || [];

  // KPIs
  const total = data.total || traces.length;
  const successes = traces.filter(t => t.status === 'success').length;
  const durations = traces.map(t => t.duration_ms).filter(Boolean);
  const allTools = traces.flatMap(t => t.tools_used || []);
  const uniqueTools = new Set(allTools);

  document.getElementById('kpiTotal').textContent = total.toLocaleString();
  document.getElementById('kpiSuccessRate').textContent =
    traces.length ? `${Math.round(successes / traces.length * 100)}%` : '—';
  document.getElementById('kpiMedianDuration').textContent = formatMs(median(durations));
  document.getElementById('kpiTools').textContent = uniqueTools.size;

  // Tool frequency chart
  const toolCount = {};
  allTools.forEach(t => { toolCount[t] = (toolCount[t] || 0) + 1; });
  const sortedTools = Object.entries(toolCount).sort((a,b) => b[1]-a[1]).slice(0, 10);
  renderToolChart(sortedTools.map(e => e[0]), sortedTools.map(e => e[1]));

  // Duration distribution chart
  const buckets = [0, 500, 1000, 2000, 5000, 10000, Infinity];
  const labels = ['<500ms','500ms-1s','1-2s','2-5s','5-10s','>10s'];
  const counts = new Array(labels.length).fill(0);
  durations.forEach(d => {
    for (let i = 0; i < buckets.length - 1; i++) {
      if (d >= buckets[i] && d < buckets[i+1]) { counts[i]++; break; }
    }
  });
  renderDurationChart(labels, counts);

  // Table
  document.getElementById('tableCount').textContent = `${traces.length} traces affichées`;
  const tbody = document.getElementById('traceTableBody');
  if (!traces.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">Aucune trace trouvée</td></tr>';
    return;
  }
  tbody.innerHTML = traces.slice(0, 100).map(t => `
    <tr>
      <td class="text-muted">${t.id}</td>
      <td>${roleBadge(t.role)}</td>
      <td class="text-truncate" style="max-width:200px" title="${t.message_preview || ''}">${t.message_preview || '—'}</td>
      <td><span class="badge bg-secondary">${t.steps_count}</span></td>
      <td><small>${(t.tools_used || []).slice(0,3).join(', ') || '—'}${(t.tools_used||[]).length > 3 ? '…' : ''}</small></td>
      <td>${formatMs(t.duration_ms)}</td>
      <td>${statusBadge(t.status)}</td>
      <td><small class="text-muted">${t.created_at ? new Date(t.created_at).toLocaleString('fr-FR') : '—'}</small></td>
      <td><button class="btn btn-sm btn-outline-secondary py-0" onclick="showDetail(${t.id})">→</button></td>
    </tr>
  `).join('');
}

function renderToolChart(labels, data) {
  const ctx = document.getElementById('chartTools').getContext('2d');
  if (chartTools) chartTools.destroy();
  chartTools = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Utilisations', data, backgroundColor: '#0d6efd88', borderColor: '#0d6efd', borderWidth: 1 }]
    },
    options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
  });
}

function renderDurationChart(labels, data) {
  const ctx = document.getElementById('chartDuration').getContext('2d');
  if (chartDuration) chartDuration.destroy();
  chartDuration = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Nombre de traces', data, backgroundColor: '#fd7e1488', borderColor: '#fd7e14', borderWidth: 1 }]
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
}

async function showDetail(id) {
  document.getElementById('modalTraceId').textContent = `#${id}`;
  document.getElementById('modalBody').innerHTML = '<div class="text-center py-4">Chargement…</div>';
  const modal = new bootstrap.Modal(document.getElementById('traceModal'));
  modal.show();

  const t = await apiFetch(`${API_BASE}/${id}`);
  const steps = t.steps || [];
  const stepHtml = steps.map((s, i) => {
    const cls = `step-${s.type}`;
    return `<div class="mb-2 d-flex align-items-start gap-2">
      <span class="step-badge ${cls} flex-shrink-0">${s.type}</span>
      <div>
        ${s.tool ? `<strong>${s.tool}</strong> ` : ''}
        <small class="text-muted">${s.args_preview || s.preview || ''}</small>
      </div>
    </div>`;
  }).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="row g-3 mb-3">
      <div class="col-6"><strong>Rôle:</strong> ${roleBadge(t.role)}</div>
      <div class="col-6"><strong>Durée:</strong> ${formatMs(t.duration_ms)}</div>
      <div class="col-6"><strong>Statut:</strong> ${statusBadge(t.status)}</div>
      <div class="col-6"><strong>Date:</strong> <small>${t.created_at ? new Date(t.created_at).toLocaleString('fr-FR') : '—'}</small></div>
    </div>
    <div class="mb-3"><strong>Message:</strong><br><code class="text-muted">${t.message_preview || '—'}</code></div>
    ${t.error_msg ? `<div class="alert alert-danger mb-3"><strong>Erreur:</strong> ${t.error_msg}</div>` : ''}
    <div><strong>Outils utilisés:</strong> ${(t.tools_used || []).map(x => `<span class="badge bg-warning text-dark me-1">${x}</span>`).join('') || '—'}</div>
    <hr>
    <div><strong>Étapes de raisonnement (${steps.length}):</strong></div>
    <div class="mt-2">${stepHtml || '<em class="text-muted">Aucune étape enregistrée</em>'}</div>
  `;
}

// Initial load
loadAll();
</script>
</body>
</html>
