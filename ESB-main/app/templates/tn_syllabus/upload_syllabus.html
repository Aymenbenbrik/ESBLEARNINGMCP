{% extends "base.html" %}
{% block title %}Upload syllabus – {{ course.title }}{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:720px;">
  <h2 class="text-danger mb-2">Upload syllabus</h2>
  <p class="text-muted">PDF or DOCX accepted.</p>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form method="POST"
            action="{{ url_for('tn_syllabus.upload', course_id=course.id) }}"
            enctype="multipart/form-data">

        <div class="mb-3">
          <label class="form-label">Syllabus file</label>
          <input class="form-control" type="file" name="file" accept=".pdf,.doc,.docx" required>
        </div>

        <button class="btn btn-danger">Upload</button>
        <a class="btn btn-outline-secondary"
           href="{{ url_for('tn_syllabus.course_home', course_id=course.id) }}">
          Back
        </a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
