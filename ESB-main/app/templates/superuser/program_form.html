{% extends "base.html" %}
{% block content %}
<div class="container mt-4" style="max-width: 760px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">{{ 'Edit Program' if program else 'Create Program' }}</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('superuser.list_programs') }}">Back</a>
  </div>

  <div class="card bolt-card">
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input class="form-control" name="name" value="{{ program.name if program else '' }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" name="description" rows="4">{{ program.description if program else '' }}</textarea>
        </div>
        <button class="btn btn-primary" type="submit">Save</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
