{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Programs (Formations)</h1>
    <a class="btn btn-primary" href="{{ url_for('superuser.create_program') }}">
      <i class="fas fa-plus me-2"></i>New Program
    </a>
  </div>

  <div class="card bolt-card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th class="text-end" style="width: 240px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for p in programs %}
          <tr>
            <td><a href="{{ url_for('superuser.view_program', program_id=p.id) }}">{{ p.name }}</a></td>
            <td class="text-muted">{{ (p.description or '')|truncate(80) }}</td>
            <td class="text-end">
              <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('superuser.edit_program', program_id=p.id) }}">Edit</a>
              <a class="btn btn-sm btn-outline-primary" href="{{ url_for('superuser.view_program', program_id=p.id) }}">Open</a>
              <form method="post" action="{{ url_for('superuser.delete_program', program_id=p.id) }}" class="d-inline" onsubmit="return confirm('Delete program?');">
                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
              </form>
            </td>
          </tr>
          {% else %}
          <tr><td colspan="3" class="text-center text-muted py-4">No programs yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
